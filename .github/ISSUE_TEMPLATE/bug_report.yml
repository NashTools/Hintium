name: Bug Report
description: Report a bug with Hintium
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: ide-version
    attributes:
      label: IDE & Version
      description: Which JetBrains IDE and version are you using?
      placeholder: "e.g. IntelliJ IDEA 2024.3.1 Ultimate"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Your OS and version.
      placeholder: "e.g. Ubuntu 24.04 / macOS 15.2 / Windows 11"
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      description: Hintium version (Settings > Plugins > Hintium).
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to trigger the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs & Screenshots
      description: |
        Paste relevant logs from **Help > Show Log in Explorer/Finder** or attach screenshots.
        Wrap logs in a code block for readability.
    validations:
      required: false
